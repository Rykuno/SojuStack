packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@hono/node-server': ^1.19.11
  '@hono/vite-dev-server': ^0.25.1
  '@nestjs-cls/transactional': ^3.2.0
  '@nestjs-cls/transactional-adapter-drizzle-orm': ^1.2.3
  '@nestjs/cache-manager': ^3.1.0
  '@nestjs/config': ^4.0.3
  '@nestjs/swagger': ^11.2.6
  '@scalar/nestjs-api-reference': ^1.1.3
  '@swc/cli': ^0.8.0
  '@swc/core': ^1.15.18
  '@types/node': ^24
  better-auth: ^1.5.5
  cacheable: ^2.3.3
  date-fns: ^4.1.0
  hono: ^4.12.8
  nestjs-zod: ^5.1.1
  swc-loader: ^0.2.7
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
